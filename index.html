<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duskgo - AI-Powered Travel Planner</title>
  <meta name="description" content="Plan your perfect trip with AI. Just describe what you want and get a detailed itinerary instantly.">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#fff;line-height:1.5;}
    header{position:sticky;top:0;background:#111;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:10;}
    main{padding:2rem;}
    .hero{max-width:800px;margin:0 auto;background:#1a1a1a;padding:3rem;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.5);}
    h1{font-size:2.5rem;margin-bottom:.5rem;color:#4cc9f0;}
    p{margin-bottom:1.5rem;color:#bbb;font-size:1.1rem;}
    input{width:100%;padding:.75rem;margin-bottom:.75rem;border:none;border-radius:8px;background:#2a2a2a;color:#fff;}
    button{background:#4cc9f0;color:#000;padding:.75rem 1.5rem;border:none;border-radius:8px;font-weight:bold;cursor:pointer;width:100%;transition:background .2s;}
    button:hover{background:#3db5db;}
    .status{margin-top:1rem;padding:.5rem;background:#222;border-radius:6px;display:none;}
    .cost{font-weight:bold;margin-top:1rem;color:#ff9800;}
    @media(min-width:640px){
      main{padding:4rem;}
      .hero{padding:4rem;}
    }
  </style>
</head>
<body>
  <header>
    <a href="/" style="font-size:1.5rem;font-weight:bold;color:#4cc9f0;text-decoration:none;">Duskgo</a>
    <nav>
      <a href="#about" style="color:#bbb;text-decoration:none;">About</a>
    </nav>
  </header>

  <main id="about">
    <section class="hero">
      <h1>AI-Powered Travel Planner</h1>
      <p>Just type what you want—beach, city, mountain trek—and let the AI craft the perfect itinerary.</p>

      <div class="status" id="status">Loading...</div>
      <div class="cost" id="cost">$0.00 | Balance: $0.00</div>

      <form id="planForm">
        <input type="text" placeholder="Describe your travel plans… (e.g. 1 week Hawaii trip for 3 people)" required />
        <button type="submit">Plan My Trip</button>
      </form>

      <div id="response" style="margin-top:1.5rem;white-space:pre-wrap;color:#ddd;"></div>
    </section>
  </main>

  <script>
    const API_KEY = 'demo-key';
    const endpoint = 'https://api.liteapi.dev/v1/query';

    document.getElementById('planForm').addEventListener('submit', async e => {
      e.preventDefault();
      const query = e.target.elements[0].value.trim();
      const statusEl = document.getElementById('status');
      const responseEl = document.getElementById('response');
      const costEl = document.getElementById('cost');

      statusEl.style.display = 'block';
      statusEl.textContent = 'Planning your trip…';
      responseEl.textContent = '';

      try {
        const resp = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({prompt: query})
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        // Simulate streaming tokens
        const reader = resp.body?.getReader();
        const decoder = new TextDecoder();
        let data = '';

        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          data += decoder.decode(value);
          responseEl.textContent += decoder.decode(value);
        }

        // Update cost badge (dummy $0.05 per request)
        costEl.textContent = `$0.05 | Balance: $${Math.max(0, 5 - 0.05).toFixed(2)}`;
      } catch (err) {
        statusEl.textContent = '❗️ Something went wrong';
        console.error(err);
      }
    });
  </script>
</body>
</html>
